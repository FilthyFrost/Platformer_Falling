<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9:16 Cave Level Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e5e5e5;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* 强制可见画布使用像素采样，保证放大后边缘依然是清晰的硬派锯齿 */
        #editor-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: crosshair;
            background-color: #000;
        }
        .tool-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- 左侧控制面板 -->
        <div class="col-span-1 space-y-6 bg-gray-800 p-6 rounded-xl border border-gray-700">
            <div>
                <h1 class="text-2xl font-bold text-white mb-1">洞穴地图生成器</h1>
                <p class="text-xs text-blue-400 font-bold">Pro 版：纯正矩形积木 + 完美像素倒角</p>
                <p class="text-xs text-gray-400 mt-1">输出尺寸: 108 x 192 (9:16)</p>
            </div>

            <!-- 生成区 -->
            <div class="space-y-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">随机生成</h2>
                <div>
                    <label class="block text-sm mb-1">复杂度 (Level 1 - 6)</label>
                    <input type="range" id="level-slider" min="1" max="6" value="3" class="w-full accent-blue-500">
                    <div class="text-center text-blue-400 font-bold mt-1" id="level-display">Level 3</div>
                </div>
                <button id="btn-generate" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition-colors">
                    随机生成地形
                </button>
            </div>

            <hr class="border-gray-600">

            <!-- 编辑区 -->
            <div class="space-y-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">手动编辑 (方形画笔)</h2>
                
                <div class="flex space-x-2">
                    <button id="btn-brush" class="tool-btn active flex-1 bg-gray-700 hover:bg-gray-600 border border-gray-600 py-2 rounded transition-colors">
                        ⬜ 挖方块
                    </button>
                    <button id="btn-eraser" class="tool-btn flex-1 bg-gray-700 hover:bg-gray-600 border border-gray-600 py-2 rounded transition-colors">
                        ⬛ 填岩石
                    </button>
                </div>

                <div>
                    <label class="block text-sm mb-1">画笔边长: <span id="brush-size-display">12</span>px</label>
                    <input type="range" id="brush-size" min="4" max="36" step="2" value="12" class="w-full accent-gray-400">
                </div>

                <button id="btn-clear" class="w-full bg-red-900 hover:bg-red-800 text-red-200 py-2 px-4 rounded transition-colors">
                    清空画布 (全黑)
                </button>
            </div>

            <hr class="border-gray-600">

            <!-- 导出区 -->
            <div>
                <button id="btn-export" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded shadow-lg transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    导出 PNG
                </button>
            </div>
        </div>

        <!-- 右侧画布区 -->
        <div class="col-span-2 flex justify-center items-center bg-gray-900 rounded-xl border border-gray-700 p-8">
            <div class="relative">
                <!-- 实际真实尺寸为 108x192，通过 CSS 放大 3 倍显示，即 324x576 -->
                <canvas id="editor-canvas" width="108" height="192" style="width: 324px; height: 576px;"></canvas>
            </div>
        </div>

    </div>

    <script>
        // --- 双画布架构 ---
        // visibleCanvas: 用户看到的，经过像素倒角处理的最终效果图
        const visibleCanvas = document.getElementById('editor-canvas');
        const visibleCtx = visibleCanvas.getContext('2d', { willReadFrequently: true });
        
        // rawCanvas: 内存中隐藏的真实数据层，全是绝对的 90 度锐角方块
        // (防止反复切角导致图形无限缩水)
        const rawCanvas = document.createElement('canvas');
        rawCanvas.width = 108;
        rawCanvas.height = 192;
        const rawCtx = rawCanvas.getContext('2d', { willReadFrequently: true });

        // --- 核心常量 ---
        const WIDTH = 108;
        const HEIGHT = 192;
        const CELL = 12; // 完美的积木单位 (9列 x 16行 = 108x192)

        // UI 元素
        const btnGenerate = document.getElementById('btn-generate');
        const levelSlider = document.getElementById('level-slider');
        const levelDisplay = document.getElementById('level-display');
        const btnBrush = document.getElementById('btn-brush');
        const btnEraser = document.getElementById('btn-eraser');
        const brushSizeSlider = document.getElementById('brush-size');
        const brushSizeDisplay = document.getElementById('brush-size-display');
        const btnClear = document.getElementById('btn-clear');
        const btnExport = document.getElementById('btn-export');

        let currentTool = 'brush';
        let isDrawing = false;

        // 初始化
        clearCanvas();
        generateLevel(parseInt(levelSlider.value));

        // --- 事件监听 ---
        levelSlider.addEventListener('input', (e) => {
            levelDisplay.innerText = `Level ${e.target.value}`;
        });

        brushSizeSlider.addEventListener('input', (e) => {
            brushSizeDisplay.innerText = e.target.value;
        });

        btnGenerate.addEventListener('click', () => generateLevel(parseInt(levelSlider.value)));

        btnClear.addEventListener('click', () => { clearCanvas(); updateRender(); });

        btnBrush.addEventListener('click', () => {
            currentTool = 'brush';
            btnBrush.classList.add('active');
            btnEraser.classList.remove('active');
        });

        btnEraser.addEventListener('click', () => {
            currentTool = 'eraser';
            btnEraser.classList.add('active');
            btnBrush.classList.remove('active');
        });

        btnExport.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `cave_map_L${levelSlider.value}.png`;
            link.href = visibleCanvas.toDataURL('image/png');
            link.click();
        });

        // --- 画布手工交互 ---
        visibleCanvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            drawAtCursor(e);
        });
        
        // 只有鼠标松开时，才统一做一次倒角渲染，性能极致流畅
        window.addEventListener('mouseup', () => {
            if(isDrawing) {
                isDrawing = false;
                updateRender();
            }
        });
        
        visibleCanvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                drawAtCursor(e);
                // 绘制时实时同步给外层看（但此时不加倒角滤镜，松手才加）
                visibleCtx.drawImage(rawCanvas, 0, 0); 
            }
        });

        // 完全摒弃圆形，纯方块笔刷
        function drawAtCursor(e) {
            const rect = visibleCanvas.getBoundingClientRect();
            const scaleX = visibleCanvas.width / rect.width;
            const scaleY = visibleCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            const size = parseInt(brushSizeSlider.value);

            rawCtx.fillStyle = currentTool === 'brush' ? 'white' : 'black';
            rawCtx.fillRect(Math.floor(x - size/2), Math.floor(y - size/2), size, size);
        }

        function clearCanvas() {
            rawCtx.fillStyle = 'black';
            rawCtx.fillRect(0, 0, WIDTH, HEIGHT);
        }

        // --- 核心渲染与数学倒角系统 ---
        function updateRender() {
            // 1. 将完美的锐角方块层贴到可见画布上
            visibleCtx.drawImage(rawCanvas, 0, 0);
            
            // 2. 执行 2 次像素倒角算法，这会精准削掉所有 90度 直角，形成完美的 2px 圆角
            applyPixelFillet(visibleCtx, 2);
            
            // 3. 最后盖上不受倒角影响的出生点表情
            drawSpawnFace(visibleCtx);
        }

        // 终极倒角算法：基于细胞自动机的四邻接形态学滤镜
        function applyPixelFillet(targetCtx, passes) {
            let imgData = targetCtx.getImageData(0, 0, WIDTH, HEIGHT);
            let data = imgData.data;

            for (let pass = 0; pass < passes; pass++) {
                let changes = [];
                // 辅助函数：越界视为黑色岩石
                let getPixel = (x, y) => {
                    if (x < 0 || x >= WIDTH || y < 0 || y >= HEIGHT) return 0;
                    return data[(y * WIDTH + x) * 4] > 127 ? 1 : 0;
                };

                for (let y = 0; y < HEIGHT; y++) {
                    for (let x = 0; x < WIDTH; x++) {
                        let p = getPixel(x, y);
                        let n = getPixel(x, y - 1); // 北
                        let s = getPixel(x, y + 1); // 南
                        let w = getPixel(x - 1, y); // 西
                        let e = getPixel(x + 1, y); // 东

                        // 如果自己是白色（洞穴空间） -> 削去外凸的直角尖端
                        if (p === 1) {
                            if (n === 0 && w === 0) changes.push({x, y, v: 0});
                            else if (n === 0 && e === 0) changes.push({x, y, v: 0});
                            else if (s === 0 && w === 0) changes.push({x, y, v: 0});
                            else if (s === 0 && e === 0) changes.push({x, y, v: 0});
                        } 
                        // 如果自己是黑色（实体墙壁） -> 填补内凹的死角尖端
                        else {
                            if (n === 1 && w === 1) changes.push({x, y, v: 1});
                            else if (n === 1 && e === 1) changes.push({x, y, v: 1});
                            else if (s === 1 && w === 1) changes.push({x, y, v: 1});
                            else if (s === 1 && e === 1) changes.push({x, y, v: 1});
                        }
                    }
                }
                
                // 将变更统一写入内存
                for (let c of changes) {
                    let idx = (c.y * WIDTH + c.x) * 4;
                    let color = c.v ? 255 : 0;
                    data[idx] = color; data[idx+1] = color; data[idx+2] = color;
                }
            }
            targetCtx.putImageData(imgData, 0, 0);
        }

        // --- 积木化算法地图生成 ---
        function generateLevel(level) {
            clearCanvas();
            rawCtx.fillStyle = 'white';

            // 辅助函数：以 12x12 网格为单位直接盖章大块矩形积木
            function carveBlock(c, r, w, h) {
                rawCtx.fillRect(c * CELL, r * CELL, w * CELL, h * CELL);
            }
            function leaveBlock(c, r, w, h) {
                rawCtx.fillStyle = 'black';
                rawCtx.fillRect(c * CELL, r * CELL, w * CELL, h * CELL);
                rawCtx.fillStyle = 'white';
            }

            // 1. 强力保障：稳定的出生大厅 (c:1~5, r:1~3)。地板固定在 Y=48
            carveBlock(1, 1, 4, 2); 

            let maxFeatures = level * 2 + 2;
            let cx = 3; // 起始X网格列
            let cy = 3; // 起始Y网格行

            // 2. 主体特征生成 (大矩形、阶梯、拇指凸起)
            for (let i = 0; i < maxFeatures; i++) {
                let r = Math.random();

                if (r < 0.4 || i === 0) {
                    // 竖向主管道 / 大竖坑 (宽度 2~3格，高度 3~6格)
                    let w = 2 + Math.floor(Math.random() * 2);
                    let h = 3 + Math.floor(Math.random() * 4);
                    cx = Math.max(1, Math.min(8 - w, cx + (Math.random() > 0.5 ? 1 : -1)));
                    carveBlock(cx, cy, w, h);
                    cy += h - 1; 
                } 
                else if (r < 0.7) {
                    // 横向连廊 / 宽矩形广场 (宽度 4~7格，高度 2~4格)
                    let w = 4 + Math.floor(Math.random() * 4);
                    let h = 2 + Math.floor(Math.random() * 3);
                    let nx = Math.max(1, Math.min(8 - w, cx - Math.floor(w/2) + Math.floor(Math.random()*3)-1));
                    carveBlock(nx, cy, w, h);
                    cx = nx + Math.floor(w/2);
                    cy += h - 1;
                } 
                else if (level >= 4 && r < 0.9) {
                    // 对角阶梯 (Stairs) - 一阶一阶地挖
                    let steps = 2 + Math.floor(Math.random() * 3);
                    let dir = Math.random() > 0.5 ? 1 : -1;
                    for(let s = 0; s < steps; s++) {
                        carveBlock(cx, cy, 2, 2);
                        cx += dir;
                        cy += 1;
                        cx = Math.max(1, Math.min(6, cx)); // 防止出界
                    }
                } 
                else if (level >= 3) {
                    // 拇指凸起 (Thumbs) - 向旁边突兀地探出一块
                    let w = 1 + Math.floor(Math.random() * 2);
                    let h = 1 + Math.floor(Math.random() * 2);
                    let dir = Math.random() > 0.5 ? w : -w;
                    carveBlock(Math.max(1, Math.min(7, cx + dir)), cy, w, h);
                }

                // 防止地图挖穿底部边界
                if (cy > 14) cy = 14; 
            }

            // 3. 封底保障：强制一条通道深至底部，充分利用 9:16 长宽比
            carveBlock(Math.max(1, Math.min(6, cx)), cy, 3, 16 - cy);

            // 4. 黑色孤岛 (Islands)：只有高等级才会生成规则的实心立柱
            if (level >= 5) {
                let numIslands = level - 3; // Lv5: 2个, Lv6: 3个
                for(let i = 0; i < numIslands; i++) {
                    let ic = 2 + Math.floor(Math.random() * 5);
                    let ir = 4 + Math.floor(Math.random() * 9);
                    
                    // 读取中心点，只有这块区域本身是白色空洞，才在里面留黑柱子
                    let pixelData = rawCtx.getImageData(ic * CELL + 6, ir * CELL + 6, 1, 1).data;
                    if (pixelData[0] > 128) {
                        leaveBlock(ic, ir, 1 + Math.floor(Math.random()*2), 1 + Math.floor(Math.random()*2));
                    }
                }
            }

            // 渲染：将 RawCanvas 的纯直角图形，做完美倒角处理后发给 VisibleCanvas
            updateRender();
        }

        // 绘制表情
        function drawSpawnFace(ctx) {
            // 出生点大厅稳定在 网格[1,1] 到 [4,2]
            // 第2行底部像素是 3*CELL = 36。所以将小人脸固定在左上方的实心悬崖边 (x=24, y=34)
            ctx.fillStyle = 'black';
            ctx.fillRect(24, 34, 1, 1);     // 左眼
            ctx.fillRect(26, 35, 2, 1);     // 嘴巴
            ctx.fillRect(29, 34, 1, 1);     // 右眼
        }

    </script>
</body>
</html>
